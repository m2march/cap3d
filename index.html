<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Cap</title>
<style>
  html, body { margin: 0; height: 100%; background: #f3f1ec; }
  /* Container for the 3D cap — adjust the size to fit your site */
  #cap { width: 100%; height: 100vh; cursor: grab; }
  #cap:active { cursor: grabbing; }
</style>

<!-- Three.js is loaded from a CDN, nothing to install -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="cap"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }     from 'three/addons/loaders/DRACOLoader.js';
import { DecalGeometry }   from 'three/addons/geometries/DecalGeometry.js';
import { mergeVertices }   from 'three/addons/utils/BufferGeometryUtils.js';
import { drawHeart, drawPlane, drawHouse, drawBaby } from './icon-drawers.js';

function drawTextCard(ctx, w, h, topText = 'THIS IS THE', bottomText = 'FIRST STEP') {
  ctx.clearRect(0, 0, w, h);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#89c989';
  ctx.font = 'bold 120px "Courier New", monospace';
  ctx.fillText(topText, w / 2, h * 0.42);
  ctx.fillStyle = '#f5e07a';
  ctx.font = 'bold 160px "Courier New", monospace';
  ctx.shadowColor = '#f5e07a';
  ctx.shadowBlur = 18;
  ctx.fillText(bottomText, w / 2, h * 0.88);
  ctx.shadowBlur = 0;
}

function makeTextCardTexture(topText, bottomText) {
  const c = document.createElement('canvas');
  c.width = 1024;
  c.height = 512;
  const ctx = c.getContext('2d');
  drawTextCard(ctx, c.width, c.height, topText, bottomText);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

/* ======================================================================
   CONFIG — edit here
   ====================================================================== */
const CONFIG = {
  capColor: 0x16613f,            // fabric color (only used by the built-in procedural cap)
  modelUrl: 'assets/cap-real.glb', // path to the GLB model. null = built-in procedural cap
  modelRotationY: 3.30,          // model spin around the vertical axis (radians) so the visor faces front (-Z)
  smoothShade: false,            // smooth faceted normals (for low-poly models; not needed for the realistic one)
  modelColor: 0x141414,          // recolor the loaded model (null = keep original). 0x141414 = black

  // 3 images. dir = which side (front -Z, left -X, right +X);
  // height = position on the cap 0..1; size = WIDTH on the cap (height is auto from the image aspect ratio).
  logo:  { url: 'assets/logo.png',       dir: [-0.2, 0, -1], height: 0.54, size: 0.46 }, // front — wordmark (nudged right)
  left:  { url: 'assets/side-left.png',  dir: [-1, 0, 0.7], height: 0.40, size: 0.22 }, // left — patch (lower, toward the back)
  right: { url: 'assets/side-right.png', dir: [1, 0, 0.7], height: 0.40, size: 0.40 }, // right — plaque (lower, toward the back)

  autoRotate: true,              // idle auto-rotation until the user grabs it
  iconTextSize: 48,              // caption font size used for trophy decals
};

const container = document.getElementById('cap');

/* ---------- Renderer ---------- */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

/* ---------- Scene / camera / lights ---------- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
camera.position.set(1.9, 0.8, -2.5);      // front 3/4 from above: shows the logo, visor and right side

// Soft studio lighting from an environment (the model looks good without manual lamps)
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(3, 5, 4);
scene.add(key);
scene.add(new THREE.AmbientLight(0xffffff, 0.3));

/* ---------- Mouse controls ---------- */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0.42, 0);
controls.minDistance = 1.8;
controls.maxDistance = 7;
controls.maxPolarAngle = Math.PI * 0.95;
controls.autoRotate = CONFIG.autoRotate;
controls.autoRotateSpeed = 1.2;
controls.addEventListener('start', () => controls.autoRotate = false); // stop auto-rotation once the user drags

let capRoot = null;
const viewDirection = camera.position.clone().sub(controls.target).normalize();

function frameCapInView(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const sphere = box.getBoundingSphere(new THREE.Sphere());
  const radius = Math.max(sphere.radius, 0.001);

  controls.target.copy(sphere.center);

  const vFov = THREE.MathUtils.degToRad(camera.fov);
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * camera.aspect);
  const limitingFov = Math.min(vFov, hFov);
  const distance = (radius / Math.sin(limitingFov / 2)) * 1.08;

  camera.position.copy(sphere.center).addScaledVector(viewDirection, distance);
  controls.minDistance = distance * 0.55;
  controls.maxDistance = distance * 2.8;
  controls.update();
}

/* ======================================================================
   Fabric PBR textures (CC0, ambientCG Fabric077) — real weave,
   normal map + roughness. Shared by all parts of the procedural cap.
   ====================================================================== */
const texLoader = new THREE.TextureLoader();
function fabricTex(url, srgb, repeat) {
  const t = texLoader.load(url);
  t.colorSpace = srgb ? THREE.SRGBColorSpace : THREE.NoColorSpace;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repeat, repeat);
  t.anisotropy = 8;
  return t;
}
const FAB = {
  map:          fabricTex('assets/fabric_albedo.jpg', true, 4),
  normalMap:    fabricTex('assets/fabric_normal.jpg', false, 4),
  roughnessMap: fabricTex('assets/fabric_rough.jpg', false, 4),
};
function fabricMaterial(color, extra = {}) {
  return new THREE.MeshStandardMaterial({
    color, map: FAB.map, normalMap: FAB.normalMap, roughnessMap: FAB.roughnessMap,
    normalScale: new THREE.Vector2(1.1, 1.1), roughness: 1.0, metalness: 0.0, ...extra,
  });
}

/* ======================================================================
   Built-in procedural cap (works even without a GLB model).
   The front panel faces -Z.
   ====================================================================== */
function makeProceduralCap(color) {
  const group = new THREE.Group();
  const fabric = fabricMaterial(color);

  // Crown
  const crownGeo = new THREE.SphereGeometry(1, 96, 64, 0, Math.PI * 2, 0, Math.PI * 0.5);
  crownGeo.scale(1.0, 0.92, 1.06);            // slightly flattened, slightly longer front-to-back
  const crown = new THREE.Mesh(crownGeo, fabric);
  group.add(crown);

  // Visor — a tongue that sticks out ONLY forward (-Z) and curves gently downward
  const wSeg = 48, fSeg = 16, halfW = 1.05, reach = 1.0;
  const pos = [], idx = [];
  for (let i = 0; i <= fSeg; i++) {
    const t = i / fSeg;                       // 0 near the head → 1 at the tip
    for (let j = 0; j <= wSeg; j++) {
      const s = (j / wSeg) * 2 - 1;           // -1..1 across the width
      const round = 1 - 0.45 * s * s;         // rounded front (edges reach less far)
      const x = s * halfW * (1 - 0.32 * t);   // tapers slightly toward the tip
      const z = -(0.85 + reach * t * round);  // forward = -Z, from under the crown front
      const y = 0.05 - 0.42 * t * t;          // curves smoothly downward
      pos.push(x, y, z);
    }
  }
  for (let i = 0; i < fSeg; i++)
    for (let j = 0; j < wSeg; j++) {
      const a = i * (wSeg + 1) + j, b = a + wSeg + 1;
      idx.push(a, b, a + 1, a + 1, b, b + 1);
    }
  const visorGeo = new THREE.BufferGeometry();
  visorGeo.setIndex(idx);
  visorGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  visorGeo.computeVertexNormals();
  const visor = new THREE.Mesh(visorGeo, fabricMaterial(color, { side: THREE.DoubleSide }));
  group.add(visor);

  // Button on top
  const button = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 24, 24),
    fabricMaterial(color)
  );
  button.position.set(0, 0.92, 0);
  group.add(button);

  group.userData.decalTarget = crown;   // decals are applied onto the crown
  return group;
}

/* ======================================================================
   Image decals projected onto the cap surface — they wrap along the curve
   ====================================================================== */
const raycaster = new THREE.Raycaster();
const decalMatBase = {
  transparent: true, depthTest: true, depthWrite: false,
  polygonOffset: true, polygonOffsetFactor: -4, roughness: 0.65,
};

// Load a texture from a file; if it is missing, fall back to a generated placeholder (never throws)
function loadTexture(url, label) {
  return new Promise((resolve) => {
    new THREE.TextureLoader().load(
      url,
      (tex) => { tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 8; resolve(tex); },
      undefined,
      () => resolve(makePlaceholder(label))
    );
  });
}
function makePlaceholder(label) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const x = c.getContext('2d');
  x.fillStyle = '#ffffff'; x.fillRect(0, 0, 256, 256);
  x.strokeStyle = '#16613f'; x.lineWidth = 12; x.strokeRect(8, 8, 240, 240);
  x.fillStyle = '#16613f'; x.font = 'bold 48px sans-serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(label, 128, 128);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
}

function placeDecal(targetMesh, box, cfg, texture) {
  // side direction (horizontal) + desired height on the cap
  const horiz = new THREE.Vector3(cfg.dir[0], 0, cfg.dir[2]).normalize();
  const anchor = new THREE.Vector3(
    (box.min.x + box.max.x) / 2,
    box.min.y + (box.max.y - box.min.y) * cfg.height,
    (box.min.z + box.max.z) / 2,
  );
  // ray from outside inward — find the surface point and its normal
  raycaster.set(anchor.clone().add(horiz.clone().multiplyScalar(5)), horiz.clone().negate());
  const hit = raycaster.intersectObject(targetMesh, true)[0];
  if (!hit) { console.warn('DECAL MISS', cfg.dir); return; }

  const n = hit.face.normal.clone().transformDirection(targetMesh.matrixWorld).normalize();
  const dummy = new THREE.Object3D();
  dummy.position.copy(hit.point);
  dummy.lookAt(hit.point.clone().add(n));   // face outward along the normal

  // keep the image aspect ratio: size = width, height = width / (W/H)
  const im = texture.image;
  const iw = (im && (im.naturalWidth || im.width)) || 1;
  const ih = (im && (im.naturalHeight || im.height)) || 1;
  const w = cfg.size, h = cfg.size * (ih / iw);
  const geo = new DecalGeometry(targetMesh, hit.point, dummy.rotation, new THREE.Vector3(w, h, 0.6));
  const mat = new THREE.MeshStandardMaterial({ ...decalMatBase, map: texture });
  // DecalGeometry returns vertices in WORLD space → add to the scene, not to the mesh
  scene.add(new THREE.Mesh(geo, mat));
}

/* ======================================================================
   Scene assembly
   ====================================================================== */
// GLTF loader with Draco support (the model is compressed ~13x)
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

async function build() {
  let capGroup, target;

  if (CONFIG.modelUrl) {
    const gltf = await gltfLoader.loadAsync(CONFIG.modelUrl);
    capGroup = gltf.scene;
    capGroup.rotation.y = CONFIG.modelRotationY;     // orient the visor to the front
    // pick the largest mesh — decals go onto it (usually the crown)
    let max = -Infinity;
    capGroup.traverse((o) => {
      if (o.isMesh) {
        if (CONFIG.smoothShade) { o.geometry = mergeVertices(o.geometry); o.geometry.computeVertexNormals(); }
        if (CONFIG.modelColor != null) {          // recolor the model (e.g. to black)
          o.material = o.material.clone();
          o.material.color.set(CONFIG.modelColor);
          o.material.roughness = 0.82;
          o.material.metalness = 0.0;
        }
        const v = new THREE.Box3().setFromObject(o).getSize(new THREE.Vector3()).length();
        if (v > max) { max = v; target = o; }
      }
    });
  } else {
    capGroup = makeProceduralCap(CONFIG.capColor);
    target = capGroup.userData.decalTarget;
  }

  scene.add(capGroup);
  fitToView(capGroup);                 // center and scale to fit the camera
  capGroup.updateMatrixWorld(true);    // important: matrices ready BEFORE placing decals
  capRoot = capGroup;
  frameCapInView(capRoot);

  const box = new THREE.Box3().setFromObject(target);
  const logo = makeTextCardTexture('THIS IS THE', 'FIRST STEP');
  const textOpts = { textSize: CONFIG.iconTextSize };
  const leftHeart = await drawHeart(THREE, textOpts);
  const leftPlane = await drawPlane(THREE, textOpts);
  const rightBaby = await drawBaby(THREE, textOpts);
  const rightHouse = await drawHouse(THREE, textOpts);

  const leftHeartCfg = { ...CONFIG.left, dir: [1, 0, 0.3], height: 0.46, size: 0.20 };
  const leftPlaneCfg = { ...CONFIG.left, dir: [1, 0, -0.2], height: 0.46, size: 0.20 };
  const rightBabyCfg = { ...CONFIG.right, dir: [-1, 0, 0.15], height: 0.46, size: 0.20 };
  const rightHouseCfg = { ...CONFIG.right, dir: [-1, 0, 0.66], height: 0.46, size: 0.20 };

  placeDecal(target, box, CONFIG.logo,  logo);
  placeDecal(target, box, leftHeartCfg, leftHeart);
  placeDecal(target, box, leftPlaneCfg, leftPlane);
  placeDecal(target, box, rightBabyCfg, rightBaby);
  placeDecal(target, box, rightHouseCfg, rightHouse);
}

// Fit the model: center it horizontally, sit it "on the floor" and scale to ~1.6 units
function fitToView(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const scale = 1.6 / Math.max(size.x, size.y, size.z);
  obj.scale.setScalar(scale);
  obj.updateMatrixWorld(true);
  const box2 = new THREE.Box3().setFromObject(obj);
  const c = box2.getCenter(new THREE.Vector3());
  obj.position.sub(new THREE.Vector3(c.x, box2.min.y, c.z));
}

build();

/* ---------- Responsive sizing to the container ---------- */
function resize() {
  const w = container.clientWidth, h = container.clientHeight || 1;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  if (capRoot) frameCapInView(capRoot);
}
new ResizeObserver(resize).observe(container);
resize();

/* ---------- Render loop ---------- */
renderer.setAnimationLoop(() => {
  controls.update();
  renderer.render(scene, camera);
});

window.capViewer = { THREE, scene, camera, controls };  // debug handle (harmless)
</script>
</body>
</html>
